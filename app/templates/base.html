<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShellForge{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShellForge</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Start</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/lessons">Lekcje</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Postępy</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="page-content">
    {% block content %}{% endblock %}
</main>

<footer class="app-footer border-top text-center text-muted">
    <div class="container">
        <small>ShellForge — praktyczna nauka Linuxa, administracji systemami i DevOps.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', path='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
