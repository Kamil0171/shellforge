{% extends "base.html" %}

{% block title %}Nie znaleziono strony — ShellForge{% endblock %}

{% block content %}

<section class="error-page py-5">
    <div class="container">
        <div class="error-card card shadow-sm">
            <div class="card-body text-center">
                <span class="badge text-bg-dark mb-3">
                    Błąd 404
                </span>

                <h1 class="fw-bold mb-3">
                    Nie znaleziono strony
                </h1>

                <p class="text-muted mb-4">
                    Strona, której szukasz, nie istnieje albo została przeniesiona.
                </p>

                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a href="/" class="btn btn-dark">
                        Wróć na stronę główną
                    </a>

                    <a href="/lessons" class="btn btn-outline-secondary">
                        Przejdź do lekcji
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
